<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas Temazcal - Mandrágora Entrópica</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Modo oscuro/claro toggle -->
    <div class="theme-toggle">
        <button id="themeToggle" class="theme-btn">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <!-- Header -->
    <header>
        <h1>🌿 Reservas Temazcal</h1>
        <p>Experiencia ancestral de sanación</p>
    </header>

    <!-- Botón Admin -->
    <div class="admin-section">
        <button id="adminBtn" class="admin-btn">
            <i class="fas fa-user-shield"></i> Área Administrativa
        </button>
    </div>

    <!-- Contenedor de Paquetes -->
    <div id="paquetesContainer" class="paquetes-grid">
        <!-- Los paquetes se cargarán aquí dinámicamente -->
    </div>

    <!-- Modal para Reserva -->
    <div id="reservaModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Reservar Paquete</h2>
            <div id="paqueteInfo"></div>
            <form id="reservaForm">
                <div class="form-group">
                    <label for="nombreUsuario">Tu Nombre:</label>
                    <input type="text" id="nombreUsuario" required>
                </div>
                <div class="form-group">
                    <label for="fotoUsuario">Sube tu Foto (URL):</label>
                    <input type="url" id="fotoUsuario" placeholder="https://ejemplo.com/foto.jpg" required>
                    <small>Puedes usar servicios como imgur.com para subir imágenes</small>
                </div>
                <button type="submit" class="btn-primary">Enviar Reserva</button>
            </form>
        </div>
    </div>

    <!-- Modal para Administrador -->
    <div id="adminModal" class="modal">
        <div class="modal-content admin-modal">
            <span class="close">&times;</span>
            <h2><i class="fas fa-user-shield"></i> Panel Administrativo</h2>
            <div class="admin-login">
                <input type="password" id="adminPassword" placeholder="Ingresa la clave">
                <button id="loginAdminBtn" class="btn-primary">Acceder</button>
            </div>
            <div id="adminPanel" style="display: none;">
                <div class="admin-tabs">
                    <button class="tab-btn active" data-tab="pendientes">Pendientes</button>
                    <button class="tab-btn" data-tab="confirmados">Confirmados</button>
                    <button class="tab-btn" data-tab="gestion">Gestión</button>
                </div>
                <div id="adminContent">
                    <!-- Contenido dinámico -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <a href="https://jaid227.github.io/EntropiaDigital/" target="_blank">
            © 2026 Mandrágora Entrópica | Desarrollo Web Estratégico
        </a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
